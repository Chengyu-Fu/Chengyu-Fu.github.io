short_bio: >-
  <p>
    Hello, my name is Fu Chengyu. Welcome to my homepage!
    I received my Bachelor of Engineering degree from Harbin University of Science and Technology in 2025. 
    Currently, I am a master's student majoring in Materials Science and Engineering at the same university. 
    My research interests primarily focus on applying machine learning and physics-informed fusion methods to material forming processes.
     I have conducted work in areas such as prediction of springback in tube bending, springback compensation, flow stress prediction, as well as machine learning-assisted high-entropy alloy design. 
     Feel free to contact me anytime for communication and collaboration!
  </p>

